<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription aux Événements</title>
</head>
<body style="margin: 0; padding: 10px; font-family: sans-serif; background-color: transparent;">

<script>
    (function() {
        const estDansUneIframe = (window.self !== window.top);
        const urlParent = document.referrer;
        const siteAutorise = "https://eureka.univ-lehavre.fr";

        if (!estDansUneIframe || !urlParent.startsWith(siteAutorise)) {
            document.body.innerHTML = `
                <div style="padding: 20px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 5px; text-align: center; margin: 30px auto; max-width: 450px;">
                    <h3 style="margin-top:0;">Accès non autorisé</h3>
                </div>
            `;
            window.stop();
        }
    })();
</script>

<div style="max-width: 550px; margin: 10px auto; background: #ffffff; padding: 20px; border: 1px solid #ddd; border-radius: 6px;">
    
    <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
        <h3 style="margin-top: 0; color: #0f6cbc;">Événements disponibles</h3>
        <div id="moodle-loading-events" style="font-style: italic; color: #666; padding: 8px; border-radius: 4px;">Chargement des événements en cours...</div>
        <ul id="moodle-events-list" style="padding-left: 20px; margin: 5px 0;"></ul>
    </div>

    <div style="margin-bottom: 0; padding-bottom: 0;">
        <h3 style="margin-top: 0; color: #0f6cbc;">Inscription</h3>
        <form id="moodle-inscription-form">
            
            <div style="margin-bottom: 12px;">
                <label for="moodle-nom" style="display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px;">Nom complet :</label>
                <input type="text" id="moodle-nom" required placeholder="Ex: Jean Dupont" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 12px;">
                <label for="moodle-email" style="display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px;">Adresse Email :</label>
                <input type="email" id="moodle-email" required placeholder="Ex: jean.dupont@univ.fr" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 12px;">
                <label for="moodle-numEtudiant" style="display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px;">Numéro d'étudiant :</label>
                <input type="text" id="moodle-numEtudiant" required placeholder="Ex: 22104321" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 12px;">
                <label for="moodle-choix" style="display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px;">Sélectionnez l'événement :</label>
                <select id="moodle-choix" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <option value="">-- Choisir un événement --</option>
                </select>
            </div>

            <button type="submit" style="background-color: #0f6cbc; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 15px; font-weight: bold;">Confirmer l'inscription</button>
        </form>
        
        <div id="moodle-form-message" style="padding: 10px; border-radius: 4px; margin-top: 10px; display: none; font-weight: bold;"></div>
    </div>
</div>

<script>
    (function() {
        const WORKER_URL = "https://workergrist.baptiste-petit.workers.dev/"; 

        const listElement = document.getElementById('moodle-events-list');
        const selectElement = document.getElementById('moodle-choix');
        const loader = document.getElementById('moodle-loading-events');
        const form = document.getElementById('moodle-inscription-form');
        const messageDiv = document.getElementById('moodle-form-message');

        // 1. Récupération des événements (GET)
        async function fetchEvents() {
            try {
                const response = await fetch(WORKER_URL);
                
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || errData.details || `Erreur serveur (${response.status})`);
                }
                
                const records = await response.json();
                loader.style.display = 'none';

                if (!records || records.length === 0) {
                    listElement.innerHTML = "<li>Aucun événement disponible actuellement.</li>";
                    return;
                }

                records.forEach(record => {
                    const fields = record.fields;
                    const eventName = fields.Nom || fields.Titre || `Événement N°${record.id}`;

                    const li = document.createElement('li');
                    li.textContent = eventName;
                    listElement.appendChild(li);

                    const option = document.createElement('option');
                    option.value = eventName;
                    option.textContent = eventName;
                    selectElement.appendChild(option);
                });
            } catch (err) {
                loader.innerHTML = "⚠️ <strong>Erreur technique :</strong> " + err.message + "<br><small>Veuillez contacter un administrateur.</small>";
                loader.style.backgroundColor = "#f8d7da";
                loader.style.color = "#721c24";
                console.error("Détail de l'erreur FetchEvents:", err);
            }
        }

        // 2. Soumission du formulaire (POST)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.style.display = "none";

            const payload = {
                nom: document.getElementById('moodle-nom').value,
                email: document.getElementById('moodle-email').value,
                numEtudiant: document.getElementById('moodle-numEtudiant').value,
                choix: document.getElementById('moodle-choix').value
            };

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json().catch(() => ({}));

                if (response.ok && result.success) {
                    messageDiv.textContent = "✅ Inscription enregistrée avec succès !";
                    messageDiv.style.backgroundColor = "#d4edda";
                    messageDiv.style.color = "#155724";
                    messageDiv.style.display = "block";
                    form.reset();
                } else {
                    throw new Error(result.error || result.details || "Une erreur est survenue.");
                }
            } catch (err) {
                messageDiv.textContent = "❌ Échec de l'inscription : " + err.message;
                messageDiv.style.backgroundColor = "#f8d7da";
                messageDiv.style.color = "#721c24";
                messageDiv.style.display = "block";
            }
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fetchEvents);
        } else {
            fetchEvents();
        }
    })();
</script>

</body>
</html>
